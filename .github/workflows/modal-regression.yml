name: Modal Regression

on:
  pull_request:
    paths:
      - "app/**"
      - "components/ui/**"
      - "lib/navigation-options.ts"
      - "e2e/**"
      - "__tests__/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/modal-regression.yml"
  workflow_dispatch:

jobs:
  modal-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run modal unit regression
        run: npm run test:regression:modal:unit

      - name: Run modal smoke regression
        run: npm run test:regression:modal:e2e
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}

